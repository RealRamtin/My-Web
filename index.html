<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
min-height:100vh;
overflow-x:hidden;
overflow-y:auto;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at center,#161616 0%,#080808 50%,#000 100%);
color:#fff;
}

.bg{
position:fixed;
inset:0;
overflow:hidden;
z-index:-1;
}

.cross{
position:absolute;
opacity:.15;
filter:drop-shadow(0 0 15px rgba(255,255,255,.3));
animation:floatCross 14s ease-in-out infinite,rotateCross 25s linear infinite;
}

@keyframes floatCross{
0%{transform:translateY(-50px)}
50%{transform:translateY(50px)}
100%{transform:translateY(-50px)}
}

@keyframes rotateCross{
from{rotate:0deg}
to{rotate:360deg}
}

.center{
text-align:center;
padding:55px 75px;
margin-top:60px;
background:rgba(255,255,255,.03);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
border-radius:35px;
}

.reze{
width:240px;
height:340px;
object-fit:cover;
border-radius:22px;
margin-bottom:25px;
}

.title{
font-size:80px;
font-weight:700;
background:linear-gradient(90deg,#fff,#d7d7d7,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.telegram,.id{
margin-top:15px;
font-size:20px;
}

.fortnite-section{
padding:120px 10%;
width:100%;
}

.fortnite-card{
display:flex;
gap:60px;
align-items:center;
background:rgba(255,255,255,.03);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
padding:40px;
border-radius:30px;
}

.fortnite-img{
width:300px;
border-radius:20px;
}

@media (max-width:900px){

.center{
width:95%;
padding:25px 15px;
margin-top:20px;
}

.title{
font-size:38px;
line-height:1.1;
}

.telegram,.id{
font-size:16px;
}

.reze{
width:170px;
height:240px;
}

.fortnite-section{
padding:60px 15px;
}

.fortnite-card{
flex-direction:column;
text-align:center;
gap:25px;
padding:25px 15px;
}

.fortnite-img{
width:180px;
max-width:100%;
}
}
</style>
</head>
<body>

<img src="cross-transparent.png" class="cross" style="left:22%;top:35%;width:140px;">
<img src="cross-transparent.png" class="cross" style="left:35%;top:10%;width:250px;">
</div>

</div>

<p>✓ Get More Performance In Game</p>
<p>✓ Get Better Aim</p>
<p>✓ Super Register Build And Ammo</p>

<h3>Only 7 Dollars - 1,200 Toman</h3>
</div>

</div>
