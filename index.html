<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorento Tweak</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at center,#161616 0%,#080808 50%,#000 100%);
color:#fff;
overflow-x:hidden;
}
.bg{position:fixed;inset:0;z-index:-1;overflow:hidden}
.cross{
position:absolute;
opacity:.15;
filter:drop-shadow(0 0 15px rgba(255,255,255,.3));
animation:floatCross 14s ease-in-out infinite,rotateCross 25s linear infinite;
}
@keyframes floatCross{0%{transform:translateY(-50px)}50%{transform:translateY(50px)}100%{transform:translateY(-50px)}}
@keyframes rotateCross{from{rotate:0deg}to{rotate:360deg}}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}
.center{
text-align:center;
padding:55px 75px;
background:rgba(255,255,255,.03);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
border-radius:35px;
}
.reze{
width:240px;height:340px;object-fit:cover;
border-radius:22px;margin-bottom:25px;
animation:rezeFloat 5s ease-in-out infinite;
}
@keyframes rezeFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.title{
font-size:80px;font-weight:700;
background:linear-gradient(90deg,#fff,#d7d7d7,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.telegram,.id{margin-top:15px;font-size:20px}

.fortnite-section{padding:120px 10%}
.fortnite-card{
display:flex;gap:60px;align-items:center;
background:rgba(255,255,255,.03);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
padding:40px;border-radius:30px;
}
.fortnite-img{width:300px;border-radius:20px}
.fortnite-text h2{font-size:52px;margin-bottom:25px}
.fortnite-text p{font-size:22px;margin-bottom:12px}
.price{margin-top:25px;font-size:28px;font-weight:700}

@media(max-width:900px){
.title{font-size:50px}
.center{width:90%;padding:30px 20px}
.fortnite-card{flex-direction:column;text-align:center}
.fortnite-img{width:220px}
.reze{width:180px;height:260px}
}
</style>
</head>
<body>

<div class="bg">
<img src="cross-transparent.png" class="cross" style="left:2%;top:8%;width:120px;">
<img src="cross-transparent.png" class="cross" style="left:12%;top:70%;width:180px;">
<img src="cross-transparent.png" class="cross" style="left:22%;top:35%;width:140px;">
<img src="cross-transparent.png" class="cross" style="left:35%;top:10%;width:250px;">
<img src="cross-transparent.png" class="cross" style="left:48%;top:82%;width:170px;">
<img src="cross-transparent.png" class="cross" style="left:60%;top:22%;width:220px;">
<img src="cross-transparent.png" class="cross" style="left:75%;top:65%;width:150px;">
<img src="cross-transparent.png" class="cross" style="left:88%;top:18%;width:230px;">
</div>

<section class="hero">
<div class="center">
<video class="reze" autoplay muted loop playsinline>
<source src="girlofff.mp4" type="video/mp4">
</video>
<div class="title">Lorento Tweak</div>
<div class="telegram">telegram id : @WeGotLorento</div>
<div class="id">telegram channel and trust : @qqLorento</div>
</div>
</section>

<section class="fortnite-section">
<div class="fortnite-card">
<img src="Reze.png" class="fortnite-img">
<div class="fortnite-text">
<h2>Fortnite Tweak</h2>
<p>✓ Get High FPS</p>
<p>✓ Get More Performance In Game</p>
<p>✓ Get Better Aim</p>
<p>✓ Super Register Build And Ammo</p>
<div class="price">Only 7 Dollars - 1,200 Toman</div>
</div>
</div>
</section>

</body>
</html>
