<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
min-height:100vh;
overflow-x:hidden;
overflow-y:auto;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at center,#161616 0%,#080808 50%,#000 100%);
color:#fff;
}

.bg{
position:fixed;
inset:0;
overflow:hidden;
z-index:-1;
}

.cross{
position:absolute;
opacity:.15;
filter:drop-shadow(0 0 15px rgba(255,255,255,.3));
animation:floatCross 14s ease-in-out infinite,rotateCross 25s linear infinite;
}

@keyframes floatCross{
0%{transform:translateY(-50px)}
50%{transform:translateY(50px)}
100%{transform:translateY(-50px)}
}

@keyframes rotateCross{
from{rotate:0deg}
to{rotate:360deg}
}

.center{
text-align:center;
padding:55px 75px;
margin-top:60px;
background:rgba(255,255,255,.03);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
border-radius:35px;
box-shadow:0 0 60px rgba(255,255,255,.04), inset 0 0 25px rgba(255,255,255,.02);
}

.reze{
width:240px;
height:340px;
object-fit:cover;
border-radius:22px;
margin-bottom:25px;
filter:drop-shadow(0 0 25px rgba(255,255,255,.4));
animation:rezeFloat 5s ease-in-out infinite;
}

@keyframes rezeFloat{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}

.title{
font-size:80px;
font-weight:700;
letter-spacing:2px;
background:linear-gradient(90deg,#fff,#d7d7d7,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.telegram,.id{
margin-top:15px;
font-size:20px;
font-weight:500;
opacity:.85;
}

.fortnite-section{
padding:120px 10%;
display:flex;
justify-content:center;
align-items:center;
width:100%;
}

.fortnite-card{
display:flex;
gap:60px;
align-items:center;
background:rgba(255,255,255,.03);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
padding:40px;
border-radius:30px;
max-width:1100px;
width:100%;
}

.fortnite-img{
width:300px;
border-radius:20px;
filter:grayscale(100%);
}

.fortnite-text h2{
font-size:52px;
margin-bottom:25px;
}

.fortnite-text p{
font-size:22px;
margin-bottom:12px;
}

.price{
margin-top:30px;
font-size:28px;
font-weight:700;
}

@media(max-width:900px){
.title{font-size:50px}
.center{width:90%;padding:30px 20px}
.reze{width:180px;height:260px}
.fortnite-card{flex-direction:column;text-align:center}
.fortnite-img{width:220px}
}
</style>
