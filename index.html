<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorento Tweak</title>


<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:#060606;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Montserrat', sans-serif;
    color:white;
}


.bg{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-1;
    overflow:hidden;
}

.cross{
    position:absolute;
    width:350px;
    opacity: 0.20;;
    animation:floatY 8s ease-in-out infinite;
    filter:blur(1px);
}


@keyframes floatY{
    0%{ transform:translateY(-40px); }
    50%{ transform:translateY(40px); }
    100%{ transform:translateY(-40px); }
}

/* بخش متن وسط */
.center{
    text-align:center;
}

.title{
    font-size:64px;
    font-weight:800;
    letter-spacing:2px;
    text-shadow:
        0 0 20px #ffffff22,
        0 0 40px #ffffff11;
}

.telegram{
    margin-top:15px;
    font-size:22px;
    font-weight:600;
    opacity:0.85;
}
.id{
    margin-top:15px;
    font-size:22px;
    font-weight:600;
    opacity:0.85;
}


</style>
</head>

<body>

<div class="bg">
    <img src="cross.png" class="cross" style="left:5%; top:20%; animation-delay:0s;">
    <img src="cross.png" class="cross" style="left:30%; top:65%; animation-delay:2s;">
    <img src="cross.png" class="cross" style="left:55%; top:25%; animation-delay:4s;">
    <img src="cross.png" class="cross" style="left:80%; top:60%; animation-delay:1s;">
</div>

<div class="center">
    <div class="title">Lorento Tweak</div>
    <div class="telegram">telegram : @qqLorento</div>
    <div class="id">id : @WeGotLorento</div>

</div>

</body>
</html>
